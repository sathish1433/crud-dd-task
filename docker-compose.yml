version: '3.9'

services:
  backend:
    image: sakthi1433/backend:v1.0
    container_name: backend
    ports:
      - "8080:8080"
    networks:
      - app-network

  frontend:
    image: sakthi1433/front-app:v1.0
    container_name: frontend
    ports:
      - "8081:8081"
    networks:
      - app-network
  mongodb:
    image: mongo:latest
    container_name: mongosvc
    networks:
      - app-network
    ports:
      - "27017:27017"
  nginx:
    image: nginx
    container_name: nginx
    networks:
      - app-network
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

networks:
  app-network:
    driver: bridge

